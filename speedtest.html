<!DOCTYPE html>
<html>
<head>
<title>AV SpeedTest</title>
<style>
body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
padding-top:50px;
}
.box{
background:rgba(255,255,255,0.08);
width:420px;
margin:auto;
padding:30px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}
h1{margin:5px 0;}
p{color:#00e5a8;margin-top:0;font-weight:bold;}
iframe{
width:100%;
height:500px;
border:none;
border-radius:15px;
margin-top:20px;
}
.button{
display:inline-block;
margin-top:15px;
padding:12px 30px;
font-size:18px;
background:#00e5a8;
border:none;
color:#003333;
border-radius:30px;
cursor:pointer;
text-decoration:none;
}
.button:hover{background:#00b383;}
</style>
</head>
<body>
<div class="box">
<h1>⚡ AV SpeedTest</h1>
<p>Mjerenje stvarne brzine interneta</p>

<!-- SpeedTest iframe -->
<iframe src="https://openspeedtest.com/speedtest"></iframe>

<!-- Dugme za podršku -->
<a href="tel:+38761234567" class="button">📞 Pozovi podršku</a>
</div>
</body>
</html>
